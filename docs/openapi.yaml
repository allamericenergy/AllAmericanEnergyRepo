openapi: 3.1.0
info:
  title: AllAmericanEnergy CRM API
  version: 0.1.0
servers:
  - url: http://localhost:4000/api
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /auth/login:
    post:
      summary: Login with email and password
      responses:
        "200":
          description: Access and refresh tokens
  /auth/refresh:
    post:
      summary: Refresh an access token
      responses:
        "200":
          description: New access token
  /auth/logout:
    post:
      summary: Revoke a refresh token
      responses:
        "204":
          description: Token revoked
  /auth/register:
    post:
      summary: Public user registration
      responses:
        "201":
          description: User registered and verification token generated
  /auth/admin/register:
    post:
      summary: Admin-created user, member, admin, or superadmin registration
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Account created according to role rules
  /users/me:
    get:
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile and permissions
  /auth/change-password:
    post:
      summary: Change current authenticated user's password
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Password changed
  /auth/verify-email:
    post:
      summary: Verify account email with token
      responses:
        "204":
          description: Email verified
  /rbac/permissions:
    get:
      summary: List permission catalog
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Permission catalog
  /rbac/roles:
    get:
      summary: List roles and assigned permissions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Roles with permissions
    post:
      summary: Create a role
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Role created
  /rbac/audit-logs:
    get:
      summary: List audit log entries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Audit logs
  /rbac/login-history:
    get:
      summary: List login history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Login history
  /rbac/sessions:
    get:
      summary: List current user's sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User sessions
  /companies:
    get:
      summary: List companies
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated companies
    post:
      summary: Create company
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Company created
  /contacts:
    get:
      summary: List contacts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated contacts
    post:
      summary: Create contact
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Contact created
  /deals:
    get:
      summary: List deals
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated deals
    post:
      summary: Create deal
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Deal created
  /tasks:
    get:
      summary: List tasks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated tasks
    post:
      summary: Create task
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Task created
  /reports/pipeline:
    get:
      summary: Pipeline report
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pipeline KPIs by stage
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

name: Deploy Backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -w apps/backend

      - name: Prepare backend deployment package
        run: |
          mkdir deploy-backend
          cp apps/backend/package.json deploy-backend/package.json
          cp -r apps/backend/dist deploy-backend/dist
          cp -r apps/backend/prisma deploy-backend/prisma
          cp -r docs deploy-backend/docs

      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-backend

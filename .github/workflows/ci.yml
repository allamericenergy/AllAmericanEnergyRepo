name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aae
          POSTGRES_PASSWORD: aae_password
          POSTGRES_DB: allamericanenergy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aae -d allamericanenergy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
        env:
          DATABASE_URL: postgresql://aae:aae_password@localhost:5432/allamericanenergy_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
      - run: npm run build
